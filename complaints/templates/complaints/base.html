<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Complaint Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow mb-5 py-3">
        <div class="container d-flex justify-content-between align-items-center">
            
            <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2 text-white" href="{% url 'home_portal' %}">
                <span>🏨</span> HostelCare
            </a>
            
            <div class="d-flex align-items-center gap-3">
                <a href="{% url 'home_portal' %}" class="btn btn-sm btn-outline-light px-3 rounded-pill fw-medium transition-all">Home</a>
                
                {% if request.user.is_authenticated %}
                    <div class="vr text-white opacity-25 my-1" style="height: 20px;"></div> <span class="badge {% if request.user.is_staff %}bg-success-subtle text-success border border-success{% else %}bg-primary-subtle text-primary border border-primary{% endif %} px-3 py-2 rounded-pill fw-semibold">
                        Role: {% if request.user.is_staff %}Warden{% else %}Student{% endif %} ({{ request.user.username }})
                    </span>
                    
                    <a href="{% url 'logout' %}" class="btn btn-sm btn-danger px-3 rounded-pill fw-medium shadow-sm">Logout</a>
                {% endif %}
            </div>
            
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

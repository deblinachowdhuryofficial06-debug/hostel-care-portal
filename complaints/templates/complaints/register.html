{% extends 'complaints/base.html' %}

{% block content %}
<div class="card shadow border-0 mx-auto" style="max-width: 450px;">
    <div class="card-body p-4">
        <h3 class="card-title text-center mb-4 text-success">Student Registration</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-success w-100 py-2">Create Account</button>
        </form>
        <div class="text-center mt-3">
            <p class="text-muted small">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
